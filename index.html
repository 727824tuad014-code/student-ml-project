<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Predictor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    color: white;
}

input {
    width: 90%;
    padding: 10px;
    margin: 8px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    width: 100%;
    border-radius: 8px;
    border: none;
    background: #4f46e5;
    color: white;
    cursor: pointer;
}

#resultBox {
    margin-top: 15px;
    display: none;
    background: white;
    color: black;
    padding: 10px;
    border-radius: 10px;
}

#loading {
    display: none;
}
</style>
</head>

<body>

<div class="card">
    <h2>📊 Student Predictor</h2>

    <input id="hours" type="number" placeholder="Study Hours (0-12)" min="0" max="12" step="0.5">
    <input id="attendance" type="number" placeholder="Attendance % (0-100)" min="0" max="100">
    <input id="sleep" type="number" placeholder="Sleep Hours (0-12)" min="0" max="12" step="0.5">

    <button onclick="predict()">Predict</button>

    <p id="loading">Predicting...</p>

    <div id="resultBox">
        <h3 id="marks"></h3>
        <p id="level"></p>
        <canvas id="chart"></canvas>
    </div>
</div>

<script>
let chart;

async function predict() {
    const hours = document.getElementById("hours").value;
    const attendance = document.getElementById("attendance").value;
    const sleep = document.getElementById("sleep").value;

    const h = Number(hours);
    const a = Number(attendance);
    const s = Number(sleep);

    // validation
    if (isNaN(h) || isNaN(a) || isNaN(s)) {
        alert("Enter valid numbers");
        return;
    }

    if (h < 0 || h > 12) {
        alert("Study hours must be 0–12");
        return;
    }

    if (a < 0 || a > 100) {
        alert("Attendance must be 0–100%");
        return;
    }

    if (s < 0 || s > 12) {
        alert("Sleep must be 0–12");
        return;
    }

    document.getElementById("loading").style.display = "block";
    document.getElementById("resultBox").style.display = "none";

    const res = await fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            hours: h,
            attendance: a,
            sleep: s
        })
    });

    const data = await res.json();

    document.getElementById("loading").style.display = "none";
    document.getElementById("resultBox").style.display = "block";

    if (data.error) {
        alert(data.error);
        return;
    }

    document.getElementById("marks").innerText =
        "Marks: " + data.prediction;

    document.getElementById("level").innerText =
        "Level: " + data.level;

    const ctx = document.getElementById("chart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: ["Marks"],
            datasets: [{
                label: "Prediction",
                data: [data.prediction]
            }]
        }
    });
}
</script>

</body>
</html>
